project_id = "ordermyphones"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[functions.pricing-engine]
verify_jwt = true

[functions.tier-upgrade]
verify_jwt = false   # invoked by pg_cron and the order webhook with a shared secret

[functions.stripe-webhook]
verify_jwt = false   # signed by Stripe; we verify the signature ourselves
